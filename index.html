
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#fff;--bg2:#f5f5f5;--text:#111;--muted:#888;--border:#e8e8e8;--red:#E8332A;--green:#1A8A4A;--accent:#E8332A}
body{font-family:'Inter',sans-serif;background:#e0e0e0;display:flex;justify-content:center;padding:12px 0;min-height:100vh}
.phone{width:360px;background:var(--bg);border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2);position:relative}
.screen{display:none;flex-direction:column;min-height:640px}
.screen.active{display:flex}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;background:var(--bg);border-bottom:1px solid var(--border)}
.tb-back{font-size:20px;color:var(--text);cursor:pointer;width:32px}
.tb-logo{display:flex;align-items:center;gap:8px}
.tb-logo-box{background:var(--red);border-radius:8px;padding:4px 10px;color:#fff;font-weight:700;font-size:16px;letter-spacing:0.5px}
.tb-lang{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;padding:4px 10px;border:1px solid var(--border);border-radius:20px}
.tb-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center}

/* LANG MENU */
.lang-dropdown{position:absolute;top:64px;right:16px;background:#fff;border:1px solid var(--border);border-radius:12px;z-index:100;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
.lang-opt{padding:11px 20px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px}
.lang-opt:hover{background:var(--bg2)}
.lang-opt.active{font-weight:600;color:var(--red)}
.lang-overlay{position:absolute;inset:0;z-index:99;display:none}

/* SCREEN 1 */
.s1-title{padding:20px 20px 10px;font-size:19px;font-weight:700;color:var(--text)}
.search-bar{margin:0 16px 16px;display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:12px;padding:11px 16px}
.search-bar input{border:none;background:transparent;font-size:14px;color:var(--text);flex:1;outline:none;font-family:'Inter',sans-serif}
.search-bar input::placeholder{color:var(--muted)}

.branch-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto;padding-bottom:20px}
.branch-card{background:var(--bg);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .12s}
.branch-card:active{transform:scale(0.98)}
.branch-cover{width:100%;height:120px;object-fit:cover;display:block;background:#ddd}
.branch-cover-ph{width:100%;height:120px;background:linear-gradient(135deg,#2D2D2D,#555);display:flex;align-items:center;justify-content:center;font-size:44px}
.branch-body{padding:13px 16px}
.branch-name{font-size:16px;font-weight:700;color:var(--text)}
.branch-time-row{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:13px;color:var(--muted)}
.dot{width:4px;height:4px;border-radius:50%;background:var(--muted)}
.open{color:var(--green);font-weight:500}
.closed{color:var(--red);font-weight:500}

/* SCREEN 2 */
.s2-hero{position:relative;flex-shrink:0}
.s2-cover{width:100%;height:220px;object-fit:cover;display:block}
.s2-cover-ph{width:100%;height:220px;display:flex;align-items:center;justify-content:center;font-size:72px}
.s2-overlay{position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(to top,rgba(0,0,0,0.75),transparent)}
.s2-logo{position:absolute;bottom:14px;right:16px;width:52px;height:52px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:#333;text-align:center;line-height:1.2;padding:6px}
.s2-name{position:absolute;bottom:18px;left:16px;color:#fff}
.s2-name-main{font-size:22px;font-weight:700}
.s2-name-sub{font-size:12px;opacity:0.75;margin-top:1px}

/* SLIDER */
.slider-wrap{overflow-x:auto;display:flex;gap:8px;padding:12px 16px;flex-shrink:0;border-bottom:1px solid var(--border)}
.slider-wrap::-webkit-scrollbar{display:none}
.slide-card{flex-shrink:0;border-radius:12px;overflow:hidden;width:110px;height:72px;position:relative;cursor:default}
.slide-img{width:100%;height:100%;object-fit:cover}
.slide-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px}
.slide-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);color:#fff;font-size:10px;font-weight:600;padding:4px 8px;line-height:1.3}

/* CATS */
.cats-wrap{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.cats-wrap::-webkit-scrollbar{display:none}
.search-icon-cat{padding:12px 12px;color:var(--muted);flex-shrink:0}
.cat-btn{font-size:14px;font-weight:600;color:var(--muted);padding:14px 14px;white-space:nowrap;cursor:pointer;position:relative;flex-shrink:0}
.cat-btn.active{color:var(--text)}
.cat-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--text);border-radius:2px}

/* MENU */
.menu-scroll{flex:1;overflow-y:auto;padding:16px}
.cat-section-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:12px}
.dish-row{display:flex;gap:12px;margin-bottom:18px;align-items:flex-start}
.dish-img{width:90px;height:80px;border-radius:10px;object-fit:cover;flex-shrink:0}
.dish-img-ph{width:90px;height:80px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;background:#f0f0f0}
.dish-info{flex:1}
.dish-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.dish-weight{font-size:12px;color:var(--muted);margin-top:2px}
.dish-price{font-size:16px;font-weight:700;color:var(--text);margin-top:6px}
.dish-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.select-btn{background:var(--bg2);border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;font-family:'Inter',sans-serif}
.qty-row{display:flex;align-items:center;gap:10px}
.q-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--text);background:transparent;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:500}
.q-num{font-size:14px;font-weight:700;min-width:18px;text-align:center}

/* CART BAR */
.cart-bar{background:var(--red);margin:10px 16px;border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;flex-shrink:0}
.cart-bar.hidden{display:none}
.cb-left{display:flex;align-items:center;gap:10px}
.cb-badge{background:rgba(255,255,255,0.25);color:#fff;width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.cb-label{font-size:14px;color:#fff;font-weight:600}
.cb-total{font-size:14px;font-weight:700;color:#fff}

/* SCREEN 3 CART */
.cart-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.cart-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border-radius:12px;padding:12px}
.cart-row-info{flex:1}
.cart-row-name{font-size:13px;font-weight:600;color:var(--text)}
.cart-row-price{font-size:12px;color:var(--muted);margin-top:2px}
.cart-footer{padding:16px;border-top:1px solid var(--border);flex-shrink:0}
.cf-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:8px}
.cf-total{display:flex;justify-content:space-between;font-size:17px;font-weight:700;color:var(--text);padding-top:12px;border-top:1px solid var(--border);margin-top:4px}
.wa-btn{width:100%;background:#25D366;color:#fff;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.book-btn2{width:100%;background:var(--text);color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;font-family:'Inter',sans-serif}
</style>

  lang=l;
  document.getElementById('lang-label').textContent=l.toUpperCase();
  document.getElementById('lang-label2').textContent=l.toUpperCase();
  document.querySelectorAll('.lang-opt').forEach(o=>o.classList.remove('active'));
  closeLang();
  renderBranches();
  document.getElementById('t-choose').textContent=t('choose');
  document.getElementById('search-input').placeholder=t('search');
  document.getElementById('t-to-cart').textContent=t('toCart');
  document.getElementById('t-cart-title').textContent=t('cartTitle');
  document.getElementById('t-positions').textContent=t('positions');
  document.getElementById('t-total').textContent=t('total');
  document.getElementById('t-wa-btn').textContent=t('waBtn');
  document.getElementById('t-book-btn').textContent=t('bookBtn');
  const v=venues.find(x=>x.id===currentVenue);
  if(v){
    document.getElementById('s2-hero-name').textContent=v.nameKey[lang];
    document.getElementById('s2-hero-type').textContent=v.nameKey[lang];
    document.getElementById('s2-branch-name').textContent=v.nameKey[lang];
    renderSlider(v);renderCats(v);renderMenu(v);
  }
}

function toggleLang(){
  const dd=document.getElementById('lang-dd');
  const ov=document.getElementById('lang-overlay');
  const rect=document.getElementById('app').getBoundingClientRect();
  dd.style.display=dd.style.display==='none'?'block':'none';
  ov.style.display=dd.style.display==='block'?'block':'none';
}
function closeLang(){document.getElementById('lang-dd').style.display='none';document.getElementById('lang-overlay').style.display='none';}

function renderBranches(filter=''){
  const list=document.getElementById('branch-list');
  list.innerHTML=venues.filter(v=>v.nameKey[lang].toLowerCase().includes(filter.toLowerCase())).map(v=>`
    <div class="branch-card" onclick="openVenue('${v.id}')">
      <img class="branch-cover" src="${v.bg}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt="">
      <div class="branch-cover-ph" style="display:none;background:${v.color}">${v.emoji}</div>
      <div class="branch-body">
        <div class="branch-name">${v.nameKey[lang]}</div>
        <div class="branch-time-row">
          <span>${v.time}</span>
          <div class="dot"></div>
          <span class="${v.timeOpen?'open':'closed'}">${v.timeOpen?t('open'):t('closed')+' 10:00'}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function filterBranches(val){renderBranches(val)}

function openVenue(id){
  currentVenue=id;cart={};currentCat='all';
  const v=venues.find(x=>x.id===id);
  document.getElementById('s2-hero-name').textContent=v.nameKey[lang];
  document.getElementById('s2-hero-type').textContent=v.nameKey[lang];
  document.getElementById('s2-branch-name').textContent=v.nameKey[lang];
  document.getElementById('s2-branch-label').textContent=t('branch');
  const ph=document.getElementById('s2-cover-ph');
  ph.style.background=v.color;ph.textContent=v.emoji;ph.style.display='flex';
  renderSlider(v);renderCats(v);renderMenu(v);updateCartBar();
  showScreen('s2');
}

function renderSlider(v){
  const w=document.getElementById('slider-wrap');
  w.innerHTML=v.slides.map(sk=>`
    <div class="slide-card">
      <img class="slide-img" src="${slideImgs[sk]||''}" onerror="this.style.display='none'" alt="">
      <div class="slide-label">${ts(sk)}</div>
    </div>
  `).join('');
}

function renderCats(v){
  const w=document.getElementById('cats-wrap');
  const allCats=['all',...v.cats];
  w.innerHTML=`<div class="search-icon-cat"><svg width="16" height="16" fill="none" stroke="#888" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>`+
  allCats.map(c=>`<div class="cat-btn ${c===currentCat?'active':''}" onclick="filterCat('${c}',this)">${tc(c)}</div>`).join('');
}

function filterCat(cat,el){
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const v=venues.find(x=>x.id===currentVenue);
  renderMenu(v);
}

function renderMenu(v){
  const dishes=v.dishes.filter(d=>currentCat==='all'||d.cat===currentCat);
  const scroll=document.getElementById('menu-scroll');
  scroll.innerHTML=`<div class="cat-section-title">${tc(currentCat==='all'?'all':currentCat)}</div>`+
  dishes.map(d=>{
    const qty=cart[d.id]||0;
    return`<div class="dish-row">
      <img class="dish-img" src="${d.img}" onerror="this.outerHTML='<div class=dish-img-ph>🍽️</div>'" alt="">
      <div class="dish-info">
        <div class="dish-name">${td(d.nk)}</div>
        <div class="dish-weight">${d.w}</div>
        <div class="dish-bottom">
          <div class="dish-price">${d.price} ${lang==='en'?'KGS':'сом'}</div>
          ${qty===0
            ?`<button class="select-btn" onclick="addItem(${d.id})">${t('select')}</button>`
            :`<div class="qty-row"><button class="q-btn" onclick="removeItem(${d.id})">−</button><div class="q-num">${qty}</div><button class="q-btn" onclick="addItem(${d.id})">+</button></div>`
          }
        </div>
      </div>
    </div>`;
  }).join('');
}

function getD(id){const v=venues.find(x=>x.id===currentVenue);return v.dishes.find(d=>d.id===id);}
function addItem(id){cart[id]=(cart[id]||0)+1;const v=venues.find(x=>x.id===currentVenue);renderMenu(v);updateCartBar();}
function removeItem(id){if(cart[id]>1)cart[id]--;else delete cart[id];const v=venues.find(x=>x.id===currentVenue);renderMenu(v);updateCartBar();}

function updateCartBar(){
  const keys=Object.keys(cart);
  const total=keys.reduce((s,id)=>s+(getD(+id)?.price||0)*cart[id],0);
  const count=keys.reduce((s,id)=>s+cart[id],0);
  const bar=document.getElementById('cart-bar');
  if(count===0){bar.classList.add('hidden');return;}
  bar.classList.remove('hidden');
  document.getElementById('cb-count').textContent=count;
  document.getElementById('cb-total').textContent=total+(lang==='en'?' KGS':' сом');
}

function goCart(){
  const keys=Object.keys(cart);
  let total=0,count=0;
  document.getElementById('cart-list').innerHTML=keys.map(id=>{
    const d=getD(+id);if(!d)return'';
    const sub=d.price*cart[id];total+=sub;count+=cart[id];
    return`<div class="cart-row">
      <img src="${d.img}" style="width:52px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0" alt="" onerror="this.style.display='none'">
      <div class="cart-row-info">
        <div class="cart-row-name">${td(d.nk)} × ${cart[id]}</div>
        <div class="cart-row-price">${d.price} × ${cart[id]} = ${sub} ${lang==='en'?'KGS':'сом'}</div>
      </div>
      <div class="qty-row"><button class="q-btn" onclick="rcart(${id})">−</button><div class="q-num">${cart[id]}</div><button class="q-btn" onclick="acart(${id})">+</button></div>
    </div>`;
  }).join('');
  document.getElementById('cf-count').textContent=count;
  document.getElementById('cf-total').textContent=total+(lang==='en'?' KGS':' сом');
  showScreen('s3');
}

function acart(id){cart[+id]=(cart[+id]||0)+1;goCart();updateCartBar();}
function rcart(id){if(cart[+id]>1)cart[+id]--;else delete cart[+id];goCart();updateCartBar();}

function sendWA(type){
  const v=venues.find(x=>x.id===currentVenue);
  const name=v.nameKey[lang];
  const keys=Object.keys(cart);
  const lines=keys.map(id=>{const d=getD(+id);return`${td(d.nk)} × ${cart[id]} = ${d.price*cart[id]} сом`;}).join('\n');
  const total=keys.reduce((s,id)=>s+(getD(+id)?.price||0)*cart[id],0);
  const msg=type==='book'?`Бронь: ${name}\n\n${lines}\n\nИтого: ${total} сом`:`Заказ: ${name}\n\n${lines}\n\nИтого: ${total} сом`;
  alert('WhatsApp откроется с сообщением:\n\n'+msg);
}

renderBranches();
</script>
